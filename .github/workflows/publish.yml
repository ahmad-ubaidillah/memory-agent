name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build:all

      - name: Verify build output
        run: |
          ls -lah dist/
          test -f dist/index.js || { echo "Build failed: dist/index.js not found"; exit 1; }
          test -f dist/index.d.ts || { echo "Build failed: dist/index.d.ts not found"; exit 1; }
          test -x bin/memory-agent-mcp.js || { echo "CLI not executable"; exit 1; }

      - name: Test CLI
        run: |
          node bin/memory-agent-mcp.js --version
          node bin/memory-agent-mcp.js --help

      - name: Dry-run package
        run: bun run pack:dry

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Git tag (if not exists)
        if: github.event.release.tag_name == ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a v${{ steps.package_version.outputs.VERSION }} -m "Release v${{ steps.package_version.outputs.VERSION }}"
          git push origin v${{ steps.package_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-release verification
        run: |
          echo "✅ Successfully published @memory-agent/mcp-server@${{ steps.package_version.outputs.VERSION }}"
          echo ""
          echo "📦 Package: https://www.npmjs.com/package/@memory-agent/mcp-server"
          echo "📖 Documentation: https://github.com/${{ github.repository }}#readme"
          echo "🐛 Issues: https://github.com/${{ github.repository }}/issues"

      - name: Notify on success
        if: success()
        run: |
          echo "::notice::Successfully published @memory-agent/mcp-server@${{ steps.package_version.outputs.VERSION }} to npm"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Failed to publish package. Check the logs for details."
